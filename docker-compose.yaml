services:
  mcp:
    build:
      context: .
      dockerfile: ./mcp_service/Dockerfile
    ports:
      - "9000:9000"
    depends_on:
      - api
  api:
    build:
      context: .
      dockerfile: ./api_service/Dockerfile
    environment:
      ENV: production
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
  worker:
    build:
      context: .
      dockerfile: ./worker_service/Dockerfile
    env_file:
      - .env
    environment:
      ENV: production
      REDIS_URL: redis://redis:6379
      DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    depends_on:
      - redis
      - postgres
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  ngrok:
    image: ngrok/ngrok:latest
    command: http mcp:9000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - mcp