services:
  mcp:
    build: ./mcp
    ports:
      - "9000:9000"
    depends_on:
      - api
  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
  worker:
    build: ./worker
    env_file:
      - .env
    environment:
      ENV: production
    depends_on:
      - redis
      - postgres
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  ngrok:
    image: ngrok/ngrok:latest
    command: http mcp:9000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - mcp